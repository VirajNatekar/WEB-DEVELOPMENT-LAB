<!DOCTYPE html>
<html>
<head>
    <title>HTML Links Example</title>
</head>
<body>

    <h1>HTML Link Examples</h1>

    <!-- 1. Simple Link -->
    <h2>1. Simple Link</h2>
    <a href="https://www.google.com">https://www.google.com</a>

    <br><br>

    <!-- 2. Text Link -->
    <h2>2. Text Link</h2>
    <p>
        Visit 
        <a href="https://www.wikipedia.org">Wikipedia Website</a>
    </p>

    <br>

    <!-- 3. Image Link -->
    <h2>3. Image Link</h2>
    <a href="https://www.youtube.com" >
        <img src="youtube-icon-free-vector.JPG"
             alt="YouTube Logo" 
             width="250">
    </a>


    <!-- 4. Image Link -->
    <h2>4. Image Link</h2>
    <a href="https://www.youtube.com" target="_self">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" 
             alt="YouTube Logo" 
             width="150">
    </a>

</body>
</html>
